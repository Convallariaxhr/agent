name: CI

on:
  push:
    branches: [master, worktree-phase-1-scaffold]
  pull_request:
    branches: [master]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./... -v -count=1

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        run: go build -o convallaria ./cmd/convallaria/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: convallaria-linux
          path: convallaria