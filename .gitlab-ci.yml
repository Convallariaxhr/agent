# .gitlab-ci.yml — Convallaria CI/CD
# Triggered on every push and merge request

stages:
  - test
  - build
  - docker

variables:
  GO_VERSION: "1.22"
  GOPROXY: https://goproxy.cn,direct

# Unit tests — required job
unit-test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  script:
    - go test ./... -v -count=1
  cache:
    paths:
      - .go-cache/
  artifacts:
    when: always
    paths:
      - test-output.log
    expire_in: 7 days

# Build binary
build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - go build -o convallaria ./cmd/convallaria/
  artifacts:
    paths:
      - convallaria
    expire_in: 30 days
  needs:
    - unit-test

# Docker build and push (only on master)
docker:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs:
    - unit-test